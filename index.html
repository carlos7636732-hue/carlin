<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Gamer IA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: #00ffff;
    overflow-x: hidden;
}

/* FUNDO ANIMADO */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    text-shadow: 0 0 10px #00ffff;
}

/* BOTÃO SAIR TOPO */
.topo {
    position: fixed;
    top: 10px;
    right: 10px;
}

/* CARDS */
.card {
    background: rgba(0,0,0,0.7);
    border: 1px solid #00ffff;
    box-shadow: 0 0 10px #00ffff;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: black;
    border: 1px solid #00ffff;
    color: #00ffff;
}

/* BOTÃO NEON */
button {
    background: black;
    border: 1px solid #00ffff;
    color: #00ffff;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 15px #00ffff;
    transform: scale(1.05);
}

/* CHAT */
#chat {
    height: 150px;
    overflow-y: auto;
    background: black;
    border: 1px solid #00ffff;
    padding: 10px;
}

.msg-user { color: #00ff00; text-align: right; }
.msg-bot { color: #00ffff; }

/* LINKS */
.links {
    text-align: center;
    margin: 20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- BOTÃO SAIR -->
<div class="topo">
    <button onclick="sair()">🚪 Sair</button>
</div>

<header>🎮 Mochila Gamer IA 🤖</header>

<div class="card">
<h3>🧮 Calculadora</h3>
<input id="calc">
<button onclick="calcular()">Calcular</button>
<p id="resultado"></p>
</div>

<div class="card">
<h3>📓 Caderno</h3>
<textarea id="caderno"></textarea>
</div>

<div class="card">
<h3>🤖 IA com Voz</h3>
<div id="chat"></div>
<input id="pergunta">
<button onclick="perguntar()">Enviar</button>
<button onclick="falar()">🎤 Falar</button>
</div>

<div class="links">

<a href="carlin.html">
<button>📚 Aula 1</button>
</a>

<a href="braille.html">
<button>🔤 Aula Braille</button>
</a>

</div>

<script>

// FUNDO ANIMADO
let c = document.getElementById("bg");
let ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
    particles.push({
        x: Math.random()*c.width,
        y: Math.random()*c.height,
        dx: Math.random()*2,
        dy: Math.random()*2
    });
}

function animarBG(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,c.width,c.height);

    ctx.fillStyle="#00ffff";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x>c.width) p.x=0;
        if(p.y>c.height) p.y=0;
    });

    requestAnimationFrame(animarBG);
}
animarBG();

// CALCULADORA
function calcular(){
    try{
        resultado.innerText = eval(calc.value);
    }catch{
        resultado.innerText = "Erro";
    }
}

// CADERNO
caderno.value = localStorage.getItem("caderno") || "";
caderno.oninput = ()=> localStorage.setItem("caderno", caderno.value);

// IA TEXTO + VOZ
function perguntar(){
    let texto = pergunta.value;
    if(!texto) return;

    chat.innerHTML += `<p class="msg-user">${texto}</p>`;

    let resp = "Estou aprendendo 🤖";

    if(texto.includes("oi")) resp="Olá!";
    if(texto.includes("2+2")) resp="4";

    setTimeout(()=>{
        chat.innerHTML += `<p class="msg-bot">${resp}</p>`;
    },500);

    let voz = new SpeechSynthesisUtterance(resp);
    speechSynthesis.speak(voz);

    pergunta.value="";
}

// IA VOZ (OUVIR)
function falar(){
    let rec = new webkitSpeechRecognition();
    rec.lang = "pt-BR";

    rec.onresult = function(e){
        let texto = e.results[0][0].transcript;
        pergunta.value = texto;
        perguntar();
    }

    rec.start();
}

// BOTÃO SAIR
function sair(){
    window.history.back();
}

</script>

</body>
</html>
